let currentPalette = [];

function randomItem(arr) {
 return arr[Math.floor(Math.random()*arr.length)]
}

function generatePalette() {
 currentPalette = [];
 let shuffled = markers.sort(()=>0.5-Math.random()).slice(0,5);
 currentPalette = shuffled;
 renderPalette(shuffled);
}

function generateSkin() {
 let pool = markers.filter(m=>["red","yellow"].includes(m.family));
 let palette = [randomItem(pool),randomItem(pool),randomItem(pool)];
 currentPalette = palette;
 renderPalette(palette);
}

function renderPalette(list) {
 const el = document.getElementById("palette");
 el.innerHTML="";
 list.forEach(m=>{
   let d=document.createElement("div");
   d.innerHTML=`<div class='swatch' style='background:${m.hex}'></div>
   <div class='code'>${m.code}</div>`;
   el.appendChild(d);
 })
}

function savePalette() {
 if(!currentPalette.length) return;
 let saved = JSON.parse(localStorage.getItem("palettes")||"[]");
 saved.push(currentPalette);
 localStorage.setItem("palettes",JSON.stringify(saved));
 renderFavorites();
}

function renderFavorites() {
 let saved = JSON.parse(localStorage.getItem("palettes")||"[]");
 const el=document.getElementById("favorites");
 el.innerHTML="";
 saved.forEach(p=>{
   let row=document.createElement("div");
   row.innerHTML=p.map(c=>c.code).join(", ");
   el.appendChild(row);
 })
}

renderFavorites();
generatePalette();
